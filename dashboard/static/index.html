<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 정책 오케스트레이터</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f5f5; color: #333; }

        .header {
            background: #1a1a2e; color: white; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header button {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .header button:hover { background: rgba(255,255,255,0.25); }

        .container { display: flex; height: calc(100vh - 52px); }

        /* 좌측: MCP 패널 */
        .sidebar {
            width: 260px; background: white; border-right: 1px solid #e0e0e0;
            padding: 16px; overflow-y: auto; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 14px; color: #666; margin-bottom: 12px; }
        .mcp-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
            background: #f8f9fa; border: 1px solid #e9ecef;
        }
        .mcp-item .mcp-info { display: flex; align-items: center; gap: 8px; flex: 1; }
        .mcp-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .mcp-dot.connected { background: #22c55e; }
        .mcp-dot.disconnected { background: #ef4444; }
        .mcp-name { font-size: 13px; font-weight: 500; }
        .mcp-toggle {
            background: none; border: 1px solid #ccc; border-radius: 4px;
            padding: 2px 8px; font-size: 11px; cursor: pointer; color: #666;
        }
        .mcp-toggle:hover { background: #f0f0f0; }
        .mcp-toggle.disconnect { color: #ef4444; border-color: #ef4444; }
        .mcp-toggle.connect { color: #22c55e; border-color: #22c55e; }

        /* 우측: 메인 영역 */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* 질의 입력 */
        .query-box {
            padding: 16px 24px; background: white; border-bottom: 1px solid #e0e0e0;
        }
        .query-box h2 { font-size: 14px; color: #666; margin-bottom: 8px; }
        .query-input-wrap {
            display: flex; gap: 8px;
        }
        .query-input {
            flex: 1; padding: 10px 14px; border: 1px solid #d0d0d0; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .query-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .query-btn {
            background: #6366f1; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500;
        }
        .query-btn:hover { background: #4f46e5; }
        .query-btn:disabled { background: #a5a6f6; cursor: not-allowed; }

        /* 결과 영역 */
        .results { flex: 1; overflow-y: auto; padding: 16px 24px; }

        /* 추론 과정 */
        .reasoning { margin-bottom: 16px; }
        .reasoning h3 {
            font-size: 13px; color: #666; margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .step {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 8px 12px; margin-bottom: 4px; border-radius: 6px;
            background: #f0f4ff; border-left: 3px solid #6366f1; font-size: 13px;
        }
        .step-num {
            background: #6366f1; color: white; border-radius: 50%;
            width: 20px; height: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; flex-shrink: 0; font-weight: 600;
        }
        .step-text { flex: 1; }

        /* 답변 */
        .answer-box {
            background: white; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 20px; margin-bottom: 12px;
        }
        .answer-box h3 { font-size: 14px; color: #333; margin-bottom: 12px; }
        .answer-content {
            font-size: 14px; line-height: 1.7; white-space: pre-wrap;
        }
        .answer-content table {
            border-collapse: collapse; margin: 8px 0; width: 100%;
        }
        .answer-content th, .answer-content td {
            border: 1px solid #e0e0e0; padding: 6px 10px; font-size: 13px; text-align: left;
        }
        .answer-content th { background: #f8f9fa; font-weight: 600; }

        /* 출처 */
        .sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .source-tag {
            background: #e8e8ff; color: #4338ca; padding: 3px 10px;
            border-radius: 12px; font-size: 12px; font-weight: 500;
        }

        /* 메타 */
        .meta { font-size: 12px; color: #999; margin-top: 8px; }

        /* 로딩 */
        .loading {
            display: flex; align-items: center; gap: 10px;
            padding: 20px; color: #666; font-size: 14px;
        }
        .spinner {
            width: 20px; height: 20px; border: 2px solid #e0e0e0;
            border-top-color: #6366f1; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 빈 상태 */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: #aaa; gap: 8px;
        }
        .empty-state .icon { font-size: 40px; }
        .empty-state p { font-size: 14px; }

        /* 모달 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 12px; padding: 24px;
            width: 500px; max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { font-size: 16px; margin-bottom: 16px; }
        .modal textarea {
            width: 100%; height: 300px; font-family: monospace; font-size: 13px;
            padding: 10px; border: 1px solid #d0d0d0; border-radius: 6px; resize: vertical;
        }
        .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        .modal-btns button {
            padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        .modal-btns .cancel { background: #f0f0f0; border: none; }
        .modal-btns .save { background: #6366f1; color: white; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>MCP Policy Orchestrator</h1>
    <button onclick="openPolicyModal()">main-policy 편집</button>
</div>

<div class="container">
    <div class="sidebar">
        <h2>연결된 MCP</h2>
        <div id="mcpList"></div>
    </div>

    <div class="main">
        <div class="query-box">
            <h2>질의</h2>
            <div class="query-input-wrap">
                <input type="text" class="query-input" id="queryInput"
                       placeholder="예: 오늘 코스 와인 페어링 추천해줘"
                       onkeydown="if(event.key==='Enter') sendQuery()">
                <button class="query-btn" id="queryBtn" onclick="sendQuery()">전송</button>
            </div>
        </div>

        <div class="results" id="results">
            <div class="empty-state">
                <div class="icon">&#127869;</div>
                <p>질문을 입력하면 MCP 정책을 탐색하여 답변합니다</p>
            </div>
        </div>
    </div>
</div>

<!-- main-policy 편집 모달 -->
<div class="modal-overlay" id="policyModal">
    <div class="modal">
        <h2>main-policy.md 편집</h2>
        <textarea id="policyEditor"></textarea>
        <div class="modal-btns">
            <button class="cancel" onclick="closePolicyModal()">취소</button>
            <button class="save" onclick="savePolicyModal()">저장</button>
        </div>
    </div>
</div>

<script>
const API = '';

// === MCP 목록 ===
async function loadMcps() {
    try {
        const res = await fetch(`${API}/api/mcps`);
        const mcps = await res.json();
        const container = document.getElementById('mcpList');
        container.innerHTML = mcps.map(m => `
            <div class="mcp-item">
                <div class="mcp-info">
                    <div class="mcp-dot ${m.connected ? 'connected' : 'disconnected'}"></div>
                    <span class="mcp-name">${m.name}</span>
                </div>
                <button class="mcp-toggle ${m.connected ? 'disconnect' : 'connect'}"
                        onclick="toggleMcp('${m.name}', ${m.connected})">
                    ${m.connected ? '해제' : '연결'}
                </button>
            </div>
        `).join('');
    } catch (e) {
        console.error('MCP 목록 로드 실패:', e);
    }
}

async function toggleMcp(name, isConnected) {
    const action = isConnected ? 'disconnect' : 'connect';
    try {
        await fetch(`${API}/api/mcps/${name}/${action}`, { method: 'POST' });
        loadMcps();
    } catch (e) {
        alert(`MCP ${action} 실패: ${e.message}`);
    }
}

// === 질의 ===
async function sendQuery() {
    const input = document.getElementById('queryInput');
    const btn = document.getElementById('queryBtn');
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    btn.textContent = '처리중...';

    const results = document.getElementById('results');
    results.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <span>MCP 정책을 탐색하고 있습니다...</span>
        </div>
    `;

    try {
        const res = await fetch(`${API}/api/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        const data = await res.json();

        if (data.detail) {
            results.innerHTML = `<div class="answer-box"><h3>오류</h3><p>${JSON.stringify(data.detail)}</p></div>`;
            return;
        }

        renderResult(data, query);
    } catch (e) {
        results.innerHTML = `<div class="answer-box"><h3>오류</h3><p>${e.message}</p></div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '전송';
    }
}

function renderResult(data, query) {
    const results = document.getElementById('results');

    // 추론 과정
    let stepsHtml = '';
    if (data.reasoning_steps && data.reasoning_steps.length > 0) {
        stepsHtml = `
            <div class="reasoning">
                <h3>추론 과정</h3>
                ${data.reasoning_steps.map(s => `
                    <div class="step">
                        <div class="step-num">${s.step_number}</div>
                        <div class="step-text">${s.description}${s.detail ? ' — ' + s.detail : ''}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // 답변 (마크다운 테이블 → HTML 변환)
    let answerHtml = escapeHtml(data.answer || '답변 없음');
    answerHtml = convertMarkdownTables(answerHtml);
    answerHtml = answerHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    answerHtml = answerHtml.replace(/\n/g, '<br>');
    // 출처 태그를 제거 (별도 표시)
    answerHtml = answerHtml.replace(/\[출처:.*?\]/g, '');

    // 출처
    let sourcesHtml = '';
    if (data.sources && data.sources.length > 0) {
        sourcesHtml = `
            <div class="sources">
                ${data.sources.map(s => `
                    <span class="source-tag">${s.mcp_name} ${s.section ? '§' + s.section : ''}</span>
                `).join('')}
            </div>
        `;
    }

    results.innerHTML = `
        ${stepsHtml}
        <div class="answer-box">
            <h3>답변</h3>
            <div class="answer-content">${answerHtml}</div>
            ${sourcesHtml}
        </div>
        <div class="meta">소요시간: ${(data.duration_ms / 1000).toFixed(1)}초</div>
    `;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function convertMarkdownTables(text) {
    const lines = text.split('<br>');
    let result = [];
    let inTable = false;
    let tableRows = [];

    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
            if (trimmed.replace(/[\|\-\s]/g, '') === '') {
                // 구분선 — 스킵
                continue;
            }
            tableRows.push(trimmed);
            inTable = true;
        } else {
            if (inTable) {
                result.push(buildTable(tableRows));
                tableRows = [];
                inTable = false;
            }
            result.push(line);
        }
    }
    if (inTable) result.push(buildTable(tableRows));
    return result.join('<br>');
}

function buildTable(rows) {
    if (rows.length === 0) return '';
    let html = '<table>';
    rows.forEach((row, i) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = i === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    html += '</table>';
    return html;
}

// === main-policy 편집 ===
async function openPolicyModal() {
    try {
        const res = await fetch(`${API}/api/main-policy`);
        const data = await res.json();
        document.getElementById('policyEditor').value = data.content;
        document.getElementById('policyModal').classList.add('active');
    } catch (e) {
        alert('main-policy 로드 실패: ' + e.message);
    }
}

function closePolicyModal() {
    document.getElementById('policyModal').classList.remove('active');
}

async function savePolicyModal() {
    const content = document.getElementById('policyEditor').value;
    try {
        await fetch(`${API}/api/main-policy`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content }),
        });
        closePolicyModal();
        loadMcps();
    } catch (e) {
        alert('저장 실패: ' + e.message);
    }
}

// 초기 로드
loadMcps();
</script>

</body>
</html>
